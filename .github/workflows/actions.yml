name: Churn API CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  testing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest tests/ -v --cov=app --cov=main --cov-report=term-missing

  docker-creation:
    runs-on: ubuntu-latest
    needs: testing

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names ${{ vars.ECR_REPOSITORY }} || \
          aws ecr create-repository --repository-name ${{ vars.ECR_REPOSITORY }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:latest $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  deployment:
    runs-on: ubuntu-latest
    needs: docker-creation

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          CONTAINER_PUBLIC_PORT: ${{ vars.CONTAINER_PUBLIC_PORT }}
          APP_PORT: ${{ vars.APP_PORT }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_REGION,ECR_REGISTRY,ECR_REPOSITORY,CONTAINER_PUBLIC_PORT,APP_PORT
          script: |
            sudo yum update -y
            sudo yum install -y docker awscli || true
            sudo systemctl enable docker
            sudo systemctl start docker

            aws ecr get-login-password --region $AWS_REGION | sudo docker login --username AWS --password-stdin $ECR_REGISTRY

            sudo docker pull $ECR_REGISTRY/$ECR_REPOSITORY:latest

            sudo docker stop churn-api || true
            sudo docker rm churn-api || true

            sudo docker run -d \
              --name churn-api \
              --restart unless-stopped \
              -p $CONTAINER_PUBLIC_PORT:$APP_PORT \
              $ECR_REGISTRY/$ECR_REPOSITORY:latest
